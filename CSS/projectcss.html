<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS</title>
    <style>
      .cons {
        width: 300px;
        height: 350px;
        background: gold;
        padding: 15px;
      }
      .head1 {
        color: #e60f0f;
      }
      .abz {
        background: azure;
        font-size: small;
       
      }
      .az {
        background: olive;
      }
      .head2 {
        color: rgb(15, 11, 240);
        font-size: larger;
        font-family: Georgia, "Times New Roman", Times, serif;
       
      }
      .fgh {
        color: darkorchid;
        font-size: 14px;
      }
      .was {
        background-color: blueviolet;
        
      }
    </style>
  </head>
  <body>
    <div class="cons">
      <h1 class="head1">Sunday Separate</h1>

      <div class="abz">
        <p>Lorem ipsum dolor sit amet.</p>

        <ol class="az">
          <li>sunday</li>
          <li>monday</li>
          <li>tuesday</li>
          <li>wednesday</li>
        </ol>
        <h5 class="head2">Lorem ipsum consectetur adipisicing elit.</h5>
      </div>
      <footer class="fgh">Lorem, ipsum dolor.</footer>

      <strong class="was">Lorem ipsum dolor sit amet.</strong>
    </div>
  </body>
</html>
