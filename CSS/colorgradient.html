<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .vai{
            width: 300px;
            height: 300px;
            border: 2px solid rgb(240, 230, 230);
            box-shadow: 10px 10px 20px gray;
            border-radius: 100%;
           
          
        }
        .bg1{
             background-image: conic-gradient(red, white,yellow,blue,orange, pink, black);

        }
        .vai:hover{
            transform: scale(1.03);
        }
        .bg2{
            background-image: radial-gradient(ellipse, red, blue,yellow);
        }
        .bg3{
            background-image: radial-gradient(circle,red, brown,yellow);
        }
    </style>
</head>
<body>
    <div class="vai bg1"></div>
    <br>
    <div class="vai bg2"></div><br>
    <div class="vai bg3"></div>
</body>
</html>
