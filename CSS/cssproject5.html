<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Project</title>
    <style>
      .section1 {
        justify-content: center;
        justify-items: center;
        align-items: center;
        text-align: center;
        padding: 100px;
        background-image: url(./image/29358.jpg);
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
      }
      .main1 {
        color: darkgoldenrod;
      }
      h1 {
        font-weight: 900;
      }
      .para {
        color: chartreuse;
        font-size: 14px;
        font-weight: 400;
      }
      .btnn {
        background: orangered;
        border: 2px solid rgb(17, 238, 65);
        color: white;
        padding: 10px;
        border-radius: 20px;
        /* transition: 2s; */
      }
      .btnn:hover {
        background: green;
      }
    </style>
  </head>
  <body>
    <section class="section1">
      <div class="main1">
        <div class="header">
          <h1>YOUR FAVORITE SOURCE OF FREE BOOTSTRAP THEMES</h1>
          <p class="para">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Fugit esse
            ratione magni quam expedita quo vel atque dicta accusantium vitae?
          </p>
          <div>
            <button class="btnn">Find Out More</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
