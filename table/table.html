<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <h1>Students</h1>
    <table border="1">
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Course</th>
      </tr>
      <tr>
        <td>Ram</td>
        <td>19</td>
        <td>HTML</td>
      </tr>
      <tr>
        <td>Amit</td>
        <td>27</td>
        <td rowspan="2">CSS</td>
      </tr>
      <tr>
        <td>Om</td>
        <td>20</td>
        <!-- <td>js</td> -->
      </tr>
      <tfoot>
        <tr>
          <td colspan="3">Total</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
