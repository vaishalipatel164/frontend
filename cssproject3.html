<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS</title>
    <style>
      .container {
        width: 100%;
        height: 100vh;
        background-position: center;
        background-image: url(./image/cool-4k-ultra-hd-o7g87ttwv7shu1z6.jpg);
        background-repeat: no-repeat;
        background-size: cover;
        color: white;
        display: flex;
      }
      .mno {
        padding: 20px;
        margin: 40px;
        width: 300px;
        /* background: orchid; */
      }
      .abcd {
        color: aqua;
        padding: 10px;
      }
      .tank {
        color: gold;
      }
      .tie {
        font-size: large;
        font-weight: 700;
        color: rgb(187, 3, 40);
      }
      .btr1 {
        background: skyblue;
        height: 30px;
        border: 2px solid rgb(17, 230, 106);
      }
      .btr3 {
        background: rgb(245, 190, 8);
        height: 30px;
        border: 2px solid rgb(231, 14, 177);
      }
      .image {
        margin-top: 25%;
      }
      .img1 {
        border-radius: 10%;
        width: 200px;
        height: 200px;
      }
    </style>
  </head>
  <body>
    <section class="container">
      <div class="mno">
        <h4 class="abcd">Join us</h4>
        <h1 class="tank">
          Highly <br />
          Distinguished <br />
          Course
        </h1>
        <p class="tie">
          We Known how large objects will act but things on a small scale
        </p>
        <button class="btr1">Explore</button>
        <button class="btr3">Learn More</button>
      </div>
      <div class="image">
        <img class="img1" src="./image/images.jpg" alt="Vaishali" />
      </div>
    </section>
  </body>
</html>
