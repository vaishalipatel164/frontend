<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        .container{
            padding: 20px;
            width: 350px;
            height: 350px;
            border: 2px solid gray;
            border-radius: 10px;
            box-shadow: 10px 10px 10px rgb(177, 170, 161);
            margin: 50px;
        }
        img{
            width: 100%;
            height: 220px;
            border-radius: 10px;
        }
        p{
            font-size: 24px;
            color: crimson;
            font-weight: bold;
            line-height: 32px;
            margin-bottom: 2px;
        }
        .offer{
            text-align: justify;
            font-size: 24px;
            padding: 5px;
            font-weight: 900;
            
        }
        .price{
            color: blueviolet;


        }
        .realprice{
            color: gray;
            padding-left: 10px;
            
        }
        .flat{
            background-color: rgb(25, 241, 25);
            padding: 5px;
            color: antiquewhite;
            margin-left: 10px;
        }

    </style>
</head>
<body>
    <section class="container">
        <img src="./image/1.jpg" alt="">
        <p>Web Development </p>
        <hr>
        <br>
        <div class="offer">
            <span class="price">₹4500</span>
            <span class="realprice"><del>₹6999</del></span>
            <span class="flat">₹42% off</span>
        </div>
    </section>
</body>
</html>
