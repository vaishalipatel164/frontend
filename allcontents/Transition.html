<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Transition</title>
    <style>
       
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100vh;
            background-color: blue;
        }
        .main{
          width: 200px;
          height: 200px;
          border-radius: 100%;
          background-color: aqua;  
          transition: 5s all ease;
        }
        .main:hover{
            background: orangered;
            transform: scale(2) translateX(100vh) rotate(360deg); 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main"></div>
    </div>
</body>
</html>
