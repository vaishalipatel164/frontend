<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gap</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .card{
            width: 400px;
            height: 200px;
            background-color: aquamarine;
            gap: 20px;
            display: flex;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color:coral;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
</body>
</html>
