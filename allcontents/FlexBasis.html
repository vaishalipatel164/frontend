<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-Basis</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .box{
                width: 700px;
                height: 200px;
                background-color: aquamarine;
                 border: 2px solid black;
                 display: flex;
        }
        .card{
            width: 100px;
            height: 100px;
            background-color: brown;
            border: 2px solid black;
        }
        .box1{
            flex-basis: 6;
        }
        .box2{
            flex-basis: 2;
        }
    </style>
</head>
<body>
    <h2>Flex-Basis</h2>
    <div class="box">
        <div class="card box1">1</div>
        <div class="card box1">2</div>
        <div class="card box1">3</div>
        <div class="card box1">4</div>
    </div>
</body>
</html>
