<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Card</title>
    <style>
      .contents {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .main1 {
        width: 300px;
        height: 300px;
        background: blue;
        border: 2px solid;
        box-shadow: 5px 5px 10px;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .para {
        text-align: center;
        color: white;
      }
      .header{
        font-size: 16px;

      }
      .secheader{
        font-size: 30px;
        font-weight: bold;
        margin-top: -30px;
      }
      .par {
        font-size: 80px;
        font-weight: bolder;
        margin-top: -10px;
        text-shadow: 10px 10px 20px white;


      }
    </style>
  </head>
  <body>
    <div class="contents">
      <div class="main1">
        <div class="para">
          <h4 class="header">Tony</h4>
          <h1 class="secheader">Romo</h1>
          <br />
          <p class="par">9</p>
        </div>
      </div>

      <div class="main1">
        <div class="para">
          <h4>Aaron</h4>
          <h1>Rodgers</h1>
          <br />
          <p class="par">12</p>
        </div>
      </div>

      <div class="main1">
        <div class="para">
          <h4>Ben</h4>
          <h1>Roethlisberger</h1>
          <br />
          <p class="par">7</p>
        </div>
      </div>

      <div class="main1">
        <div class="para">
          <h4>Peyton</h4>
          <h1>Manning</h1>
          <br />
          <p class="par">18</p>
        </div>
      </div>

      <div class="main1">
        <div class="para">
          <h4>Tom</h4>
          <h1>Brady</h1>
          <br />
          <p class="par">12</p>
        </div>
      </div>

      <div class="main1">
        <div class="para">
          <h4>Drew</h4>
          <h1>Brees</h1>
          <br />
          <p class="par">9</p>
        </div>
      </div>
    </div>
  </body>
</html>
