<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <table border="2">
      <tr>
        <th style="background-color: aqua">Device</th>
        <th style="background-color: aqua">Brand</th>
        <th colspan="2" style="background-color: aqua">Specifications</th>
        /
      </tr>
      <tr>
        <td rowspan="3">Smartphone</td>
        <td rowspan="3">Apple</td>
        <th style="background-color: yellow">Model</th>
        <th style="background-color: yellow">Storage</th>
      </tr>
      <tr>
        <!-- <td>cell1</td> -->
        <!-- <td>cell2</td> -->
        <td>iPhone 12 Pro</td>
        <td>256 GB</td>
      </tr>
      <tr>
        <!-- <td>cell1</td> -->
        <!-- <td>cell2</td> -->
        <td>iPhone SE</td>
        <td>128 GB</td>
      </tr>
      <tr>
        <td>Laptop</td>
        <td>HP</td>
        <td colspan="2">15.6 Display</td>
        <!-- <td>cell3</td> -->
      </tr>
      <tr>
        <td>Table</td>
        <td>Samsung</td>
        <td colspan="2">10.5 Display</td>
        <!-- <th>cell3</th> -->
      </tr>
    </table>
  </body>
</html>
