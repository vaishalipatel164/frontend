<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <style>
      h1 {
        color: brown;
      }
      .nae {
        color: rgb(54, 218, 32);
      }
      #abc {
        color: darkmagenta;
      }
    </style>
  </head>
  <body>
    <form>
      <h1 class="nae">Registration Form</h1>
      <label for="name"> First-Name</label>
      <input type="name" id="name" placeholder="first name" />
      <br /><br />

      <label style="background: olivedrab" for="last-name">Last-Name</label>
      <input type="text" id="last-name" placeholder="last-name" />
      <br /><br />

      <label for="contact">Contact</label>
      <input type="text" id="contact" placeholder="contact" />
      <br /><br />

      <label for="email">Email</label>
      <input type="text" id="email" placeholder="email" />
      <br /><br />

      <label for="password"> Password</label>
      <input type="password" id="password" placeholder="password" />
      <br /><br />

      <label for="gender">Gender</label>
      <input type="radio" name="gender" id="gender" />male
      <input type="radio" name="gender" id="gender" />female
      <!-- <input type="radio" class="gend" id="gendar" />other -->
      <br /><br />

      <label for="textarea">Text Area</label>
      <textarea name="textarea" id="textArea"></textarea>
      <h1 class="nae">Registration Form</h1>
      <h1>Registration Form</h1>
      <h1>Registration Form</h1>
      <h1 class="nae" id="abc">Registration Form</h1>
      <h1 id="abc">Registration Form</h1>
      <button>Send</button>
    </form>
  </body>
</html>
